<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel APavan</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex">

  <!-- Menu -->
  <aside class="w-64 bg-gray-900 text-white p-5 min-h-screen">
    <h1 class="text-2xl font-bold mb-6">APavan</h1>
    <p class="text-sm text-gray-400">Sistema de Leads</p>
  </aside>

  <!-- Conteúdo -->
  <main class="flex-1 p-6">

    <h2 class="text-2xl font-bold mb-4">📥 Leads</h2>

    <div class="bg-white rounded-2xl shadow p-4">
      <table class="w-full">
        <thead>
          <tr class="bg-gray-200">
            <th class="p-2">Número</th>
            <th class="p-2">Mensagem</th>
            <th class="p-2">Data</th>
          </tr>
        </thead>
        <tbody id="tabela"></tbody>
      </table>
    </div>

  </main>

</div>

<script>
async function carregar() {
  const res = await fetch("/leads");
  const leads = await res.json();

  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  leads.reverse().forEach(l => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="p-2">${l.numero}</td>
      <td class="p-2">${l.mensagem}</td>
      <td class="p-2">${new Date(l.data).toLocaleString()}</td>
    `;

    tabela.appendChild(tr);
  });
}

setInterval(carregar, 2000);
</script>

</body>
</html>
